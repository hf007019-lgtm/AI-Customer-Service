<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>AI 客服</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
    }

    #chat {
      height: 90vh;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 60%;
      padding: 12px;
      border-radius: 10px;
      margin: 8px 0;
      line-height: 1.5;
    }

    .user {
      align-self: flex-end;
      background: #0b93f6;
    }

    .bot {
      align-self: flex-start;
      background: #444654;
    }

    #inputBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #40414f;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px 20px;
      background: #19c37d;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #15a76c;
    }

    .loading {
      font-style: italic;
      opacity: 0.7;
    }
  </style>

</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter') send()">
  <button onclick="send()">发送</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  // 用户消息
  addMessage(text, "user");
  input.value = "";

  // loading
  const loadingMsg = addMessage("AI 正在思考...", "bot loading");

  try {
    const res = await fetch("http://127.0.0.1:5000/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text})
    });

    const data = await res.json();

    loadingMsg.innerText = data.reply;

  } catch (err) {
    loadingMsg.innerText = "❌ 请求失败，请检查后端";
    console.error(err);
  }
}
</script>

</body>
</html>
